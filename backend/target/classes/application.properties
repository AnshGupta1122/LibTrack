# ═══════════════════════════════════
# LibTrack — Spring Boot Config
# ═══════════════════════════════════

server.port=8080

# ── H2 In-memory database (dev only) ──
spring.datasource.url=jdbc:h2:mem:libtracksdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ──
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Swap H2 for MySQL in production ──
# Set these as environment variables or in application-prod.properties:
# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# ── CORS (allowed origins driven by env var, fallback to dev URLs) ──
libtrack.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}

# ── Booking rules ──
libtrack.max-duration-hours=4
libtrack.advance-booking-days=30
libtrack.fine-per-day=5
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
