<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LibTrack — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <div class="auth-wrap">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="8" height="12" rx="1.5" fill="currentColor"/>
          <rect x="12" y="3" width="8" height="12" rx="1.5" fill="currentColor" opacity=".5"/>
          <rect x="2" y="17" width="18" height="3" rx="1.5" fill="currentColor" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">LibTrack</span>
    </div>

    <div class="auth-card">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Register</button>
        <div class="tab-slider" id="tab-slider"></div>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="l-sid" placeholder="e.g. STU2024001" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password" required/>
            <button type="button" class="eye-btn" onclick="togglePwd('l-pass',this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span>Sign In</span>
          <div class="spinner hidden" id="login-spin"></div>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="r-name" placeholder="Your full name" required/>
          </div>
          <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="r-sid" placeholder="STU2024001" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="you@college.edu" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="r-phone" placeholder="10-digit number" required/>
          </div>
          <div class="form-group">
            <label>Course</label>
            <input type="text" id="r-course" placeholder="B.Tech CSE" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="r-pass" placeholder="Min 6 characters" required/>
            <button type="button" class="eye-btn" onclick="togglePwd('r-pass',this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn-primary" id="register-btn">
          <span>Create Account</span>
          <div class="spinner hidden" id="register-spin"></div>
        </button>
      </form>
    </div>

    <p class="auth-footer">Smart Library Seat Management System</p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
